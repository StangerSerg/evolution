version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_ENGINE=postgres
      - PG_NAME=evolution
      - PG_USER=evolution
      - PG_PASSWORD=evolution_pass
      - PG_HOST=db
      - PG_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
